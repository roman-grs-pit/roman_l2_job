# Full-run config: 6 visits, 324 sims. ~11 hr / ~$4 on m5a.2xlarge at 4-way.
tag: full

# Where stage outputs land. Resolved relative to the repo root unless absolute.
output_base: output

catalog:
  input: data/metadata.parquet
  input_units: mag
  bandpass_col: F158

pointings:
  region:
    type: cone
    ra: 10.0
    dec: 0.0
    radius_deg: 0.5
  bandpass: F158
  only_pass: null             # keep all visits matching the region
  only_segment: null
  only_visit: null
  design_depth: 6             # 2 passes × 3 dithers per visit

run:
  parallelism: 4
