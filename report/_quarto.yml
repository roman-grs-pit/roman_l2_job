project:
  type: website
  output-dir: _site

website:
  title: "roman_l2_job"
  description: "Roman WFI L2 → L3 simulation + source-catalog recovery test"
  repo-url: https://github.com/roman-grs-pit/roman_l2_job
  repo-actions: [edit, issue]
  navbar:
    right:
      - icon: github
        href: https://github.com/roman-grs-pit/roman_l2_job
  sidebar:
    style: docked
    contents:
      - href: index.qmd
        text: Overview
      - href: pipeline.qmd
        text: Pipeline
      - section: "Full run"
        contents:
          - href: full/design.qmd
            text: Design
          - href: full/results.qmd
            text: Results
          - href: full/discussion.qmd
            text: Discussion

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    toc-location: right
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-overflow: wrap
    fig-cap-location: bottom
    tbl-cap-location: top
    number-sections: false

execute:
  freeze: auto   # cache rendered outputs; re-run only when .qmd source changes
  echo: true
  warning: false
